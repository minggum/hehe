<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>당첨 추첨</title>
<style>
body {
  margin: 0;
  padding: 2rem 1rem;
  background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  transition: background 0.5s;
  overflow-x: hidden;
}

body.jackpot {
  background: linear-gradient(135deg, #FFD700 0%, #FFA500 25%, #FF6B9D 50%, #C06C84 75%, #9B59B6 100%);
  background-size: 400% 400%;
  animation: gradientShift 3s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.container {
  text-align: center;
  max-width: 500px;
  position: relative;
  z-index: 10;
}

.content {
  background: white;
  border-radius: 20px;
  padding: 3rem 2rem;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  transition: all 0.5s;
}

.content.jackpot {
  background: linear-gradient(135deg, #FFF9E6 0%, #FFE4B5 100%);
  box-shadow: 0 0 60px rgba(255, 215, 0, 0.8), 0 0 120px rgba(255, 215, 0, 0.4);
  animation: jackpotShake 0.5s ease-in-out infinite;
}

@keyframes jackpotShake {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  25% { transform: translateX(-3px) rotate(-0.5deg); }
  75% { transform: translateX(3px) rotate(0.5deg); }
}

.title { font-size: 2.5rem; font-weight: 700; color: #333; margin: 0 0 0.5rem; }
.subtitle { font-size: 1.1rem; color: #666; margin: 0 0 0.5rem; }
.attempt-info { font-size: 0.95rem; color: #ff6b9d; font-weight: 600; margin-bottom: 2rem; }
.button-container { display: flex; gap: 12px; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }

.draw-btn {
  background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
  color: white; border: none; padding: 1rem 2.5rem;
  font-size: 1.1rem; font-weight: 600; border-radius: 12px;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 10px 25px rgba(255, 107, 157, 0.4);
}
.draw-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(255, 107, 157, 0.6); }
.draw-btn:active:not(:disabled) { transform: translateY(0); }
.draw-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.reset-btn {
  background: white; color: #ff6b9d; border: 2px solid #ff6b9d;
  padding: 0.8rem 1.5rem; font-size: 0.95rem; font-weight: 600;
  border-radius: 12px; cursor: pointer; transition: all 0.2s; display: none;
}
.reset-btn:hover:not(:disabled) { background: #ffe6f0; }

.result-box { margin: 2rem 0; min-height: 120px; display: none; }
.result-box.show { display: block; }

.prize-name {
  font-size: 2.8rem; font-weight: 700;
  background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin: 1rem 0;
  animation: scaleIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  line-height: 1.2;
}

.prize-name.jackpot {
  font-size: 3.5rem;
  background: linear-gradient(135deg, #FFD700 0%, #FFA500 25%, #FF6B9D 50%, #FFD700 100%);
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: jackpotText 1s ease infinite, scaleIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

@keyframes jackpotText {
  0%, 100% { background-position: 0% 50%; transform: scale(1); }
  50% { background-position: 100% 50%; transform: scale(1.05); }
}

@keyframes scaleIn {
  0% { transform: scale(0.3); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.congratulations { font-size: 1.5rem; color: #333; margin: 0.5rem 0; animation: fadeIn 0.6s ease-in; }
.congratulations.jackpot { font-size: 2rem; color: #FF6B00; font-weight: 700; animation: jackpotBounce 0.6s ease infinite; }

@keyframes jackpotBounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message { font-size: 1.05rem; color: #666; margin-top: 1rem; }

.spinner {
  display: inline-block; width: 50px; height: 50px;
  border: 4px solid #f0f0f0; border-top: 4px solid #ff6b9d;
  border-radius: 50%; animation: spin 1s linear infinite; margin: 1rem 0;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

.emoji { font-size: 2rem; margin: 0.5rem 0; }
.emoji.jackpot { font-size: 3rem; animation: jackpotSpin 1.5s linear infinite; }

@keyframes jackpotSpin {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.2); }
  100% { transform: rotate(360deg) scale(1); }
}

.special-badge {
  display: inline-block;
  background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
  color: white; padding: 4px 12px; border-radius: 20px;
  font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem;
  animation: pulse 1s infinite;
}

.special-badge.jackpot {
  font-size: 1.2rem; padding: 8px 24px;
  background: linear-gradient(135deg, #FFD700 0%, #FF6B00 50%, #FFD700 100%);
  background-size: 200% 200%;
  animation: jackpotBadge 0.8s ease infinite;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
}

@keyframes jackpotBadge {
  0%, 100% { background-position: 0% 50%; transform: scale(1) rotate(-2deg); }
  50% { background-position: 100% 50%; transform: scale(1.1) rotate(2deg); }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.jackpot-flash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: white; z-index: 8; pointer-events: none; opacity: 0;
}

.jackpot-flash.show { animation: flash 0.6s ease-out; }

@keyframes flash {
  0% { opacity: 0; }
  20% { opacity: 0.8; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div class="jackpot-flash" id="jackpotFlash"></div>

<div class="container">
  <div class="content" id="content">
    <h1 class="title">💕2주년 선물💕 </h1>
    <p class="subtitle">추첨을 통해 선물을 드립니다!</p>
    <p class="attempt-info" id="attemptInfo">남은 기회: 3번</p>
    
    <div class="button-container">
      <button class="draw-btn" id="drawBtn" onclick="drawLottery()">추첨하기</button>
      <button class="reset-btn" id="resetBtn" onclick="reset()">다시 하기</button>
    </div>

    <div class="result-box" id="resultBox">
      <div class="spinner" id="spinner"></div>
      <div id="resultContent" style="display:none;">
        <div class="congratulations" id="congratulations">축하합니다! 🎉</div>
        <div id="specialBadge"></div>
        <div class="emoji" id="emoji"></div>
        <div class="prize-name" id="prizeName"></div>
        <div class="message" id="message"></div>
      </div>
    </div>
  </div>
</div>

    spinner.style.display = 'none';
    resultContent.style.display = 'block';
    
    const prizeName = document.getElementById('prizeName');
    const congratulations = document.getElementById('congratulations');
    const emojiEl = document.getElementById('emoji');
    const specialBadge = document.getElementById('specialBadge');
    const content = document.getElementById('content');
    
    prizeName.textContent = selectedPrize.name;
    document.getElementById('message').textContent = selectedPrize.message;
    emojiEl.textContent = selectedPrize.emoji;
    
    if (isJackpot) {
      document.body.classList.add('jackpot');
      content.classList.add('jackpot');
      prizeName.classList.add('jackpot');
      congratulations.classList.add('jackpot');
      emojiEl.classList.add('jackpot');
      congratulations.textContent = '🎊 JACKPOT! 🎊';
      
      specialBadge.innerHTML = '<div class="special-badge jackpot">💎 MEGA JACKPOT 💎</div>';
      
      const flash = document.getElementById('jackpotFlash');
      flash.classList.add('show');
      setTimeout(() => flash.classList.remove('show'), 600);
      
      createMassiveConfetti();
      setTimeout(() => createMassiveConfetti(), 800);
      setTimeout(() => createMassiveConfetti(), 1600);
      
      playJackpotSound();
    } else {
      specialBadge.innerHTML = '<div class="special-badge">✨ SPECIAL ✨</div>';
      createConfetti();
      playSound();
    }
  }, delay);
  
  currentIndex++;
  updateAttemptInfo();
  
  if (currentIndex < 3) {
    resetBtn.style.display = 'inline-block';
  } else {
    resetBtn.style.display = 'none';
  }
}

function reset() {
  if (currentIndex >= 3) return;
  document.getElementById('drawBtn').disabled = false;
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('resetBtn').style.display = 'none';
}

// 일반 폭죽
function createConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  const particles = [];
  const emojis = ['💋', '💕', '💖', '💗', '✨', '⭐', '🌟', '🤗'];
  
  for (let i = 0; i < 200; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 10 + 5,
      speedY: Math.random() * 5 + 3,
      speedX: (Math.random() - 0.5) * 4,
      opacity: 1,
      emoji: emojis[Math.floor(Math.random() * emojis.length)],
      rotation: Math.random() * Math.PI * 2,
      type: 'emoji'
    });
  }
  
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let hasParticles = false;
    
    particles.forEach(p => {
      p.y += p.speedY;
      p.x += p.speedX;
      p.opacity -= 0.015;
      p.rotation += 0.1;
      
      if (p.opacity > 0) {
        ctx.globalAlpha = p.opacity;
        ctx.font = `${p.size}px Arial`;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillText(p.emoji, 0, 0);
        ctx.restore();
        hasParticles = true;
      }
    });
    
    ctx.globalAlpha = 1;
    if (hasParticles) requestAnimationFrame(animate);
  }
  
  animate();
}

// 🎰 잭팟 폭죽 + 사진들!
function createMassiveConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  const particles = window.jackpotParticles = window.jackpotParticles || [];
  const emojis = ['💰', '💵', '💎', '🎉', '🎊', '⭐', '✨', '🌟', '💫', '🏆', '👑', '💖'];
  
  // 큰 폭죽
  for (let i = 0; i < 250; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 20 + 15,
      speedY: Math.random() * 6 + 4,
      speedX: (Math.random() - 0.5) * 6,
      opacity: 1,
      emoji: emojis[Math.floor(Math.random() * emojis.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      type: 'emoji'
    });
  }
  
  // 📸 사진들도 같이 떨어짐! (천천히, 크게)
  if (photoImages.length > 0) {
    for (let i = 0; i < 20; i++) {
      const photo = photoImages[i % photoImages.length];
      const photoSize = Math.random() * 50 + 80; // 80-130px
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height - 200,
        size: photoSize,
        speedY: Math.random() * 3 + 2, // 천천히
        speedX: (Math.random() - 0.5) * 3,
        opacity: 1,
        rotation: (Math.random() - 0.5) * 0.5,
        rotSpeed: (Math.random() - 0.5) * 0.05,
        type: 'photo',
        photoImg: photo.img,
        photoRatio: photo.ratio,
        fadeRate: 0.005 // 천천히 사라짐
      });
    }
  }
  
  // 양쪽 대포 폭죽
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: 0, y: canvas.height,
      size: Math.random() * 15 + 10,
      speedY: -(Math.random() * 15 + 10),
      speedX: Math.random() * 12 + 3,
      opacity: 1,
      emoji: emojis[Math.floor(Math.random() * emojis.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      gravity: 0.3,
      type: 'emoji'
    });
    particles.push({
      x: canvas.width, y: canvas.height,
      size: Math.random() * 15 + 10,
      speedY: -(Math.random() * 15 + 10),
      speedX: -(Math.random() * 12 + 3),
      opacity: 1,
      emoji: emojis[Math.floor(Math.random() * emojis.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      gravity: 0.3,
      type: 'emoji'
    });
  }
  
  // 📸 양쪽에서 사진도 발사!
  if (photoImages.length > 0) {
    for (let i = 0; i < 6; i++) {
      const photo = photoImages[i % photoImages.length];
      // 왼쪽에서
      particles.push({
        x: 0, y: canvas.height,
        size: Math.random() * 40 + 80,
        speedY: -(Math.random() * 18 + 12),
        speedX: Math.random() * 10 + 4,
        opacity: 1,
        rotation: (Math.random() - 0.5) * 0.5,
        rotSpeed: (Math.random() - 0.5) * 0.1,
        gravity: 0.25,
        type: 'photo',
        photoImg: photo.img,
        photoRatio: photo.ratio,
        fadeRate: 0.006
      });
      // 오른쪽에서
      particles.push({
        x: canvas.width, y: canvas.height,
        size: Math.random() * 40 + 80,
        speedY: -(Math.random() * 18 + 12),
        speedX: -(Math.random() * 10 + 4),
        opacity: 1,
        rotation: (Math.random() - 0.5) * 0.5,
        rotSpeed: (Math.random() - 0.5) * 0.1,
        gravity: 0.25,
        type: 'photo',
        photoImg: photo.img,
        photoRatio: photo.ratio,
        fadeRate: 0.006
      });
    }
  }
  
  if (window.jackpotAnimating) return;
  window.jackpotAnimating = true;
  
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let hasParticles = false;
    
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.y += p.speedY;
      p.x += p.speedX;
      if (p.gravity) p.speedY += p.gravity;
      p.opacity -= (p.fadeRate || 0.008);
      p.rotation += p.rotSpeed || 0.1;
      
      if (p.opacity > 0 && p.y < canvas.height + 200) {
        ctx.globalAlpha = p.opacity;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        
        if (p.type === 'photo' && p.photoImg) {
          // 사진 그리기
          const w = p.size;
          const h = p.size / p.photoRatio;
          ctx.drawImage(p.photoImg, -w/2, -h/2, w, h);
        } else {
          // 이모지 그리기
          ctx.font = `${p.size}px Arial`;
          ctx.fillText(p.emoji, 0, 0);
        }
        
        ctx.restore();
        hasParticles = true;
      } else {
        particles.splice(i, 1);
      }
    }
    
    ctx.globalAlpha = 1;
    if (hasParticles) {
      requestAnimationFrame(animate);
    } else {
      window.jackpotAnimating = false;
    }
  }
  
  animate();
}

function playSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const now = ctx.currentTime;
  const frequencies = [523.25, 659.25, 783.99, 1046.50];
  
  frequencies.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, now + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.3);
    osc.start(now + i * 0.15);
    osc.stop(now + i * 0.15 + 0.3);
  });
}

function playJackpotSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const now = ctx.currentTime;
  
  const arpeggio = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00];
  arpeggio.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now + i * 0.08);
    gain.gain.linearRampToValueAtTime(0.25, now + i * 0.08 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.3);
    osc.start(now + i * 0.08);
    osc.stop(now + i * 0.08 + 0.3);
  });
  
  const chordTime = now + 0.7;
  const chord = [523.25, 659.25, 783.99, 1046.50];
  
  [0, 0.3, 0.6, 0.9].forEach((delay) => {
    chord.forEach((freq) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, chordTime + delay);
      gain.gain.linearRampToValueAtTime(0.15, chordTime + delay + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.01, chordTime + delay + 0.25);
      osc.start(chordTime + delay);
      osc.stop(chordTime + delay + 0.25);
    });
  });
  
  [0, 0.4, 0.8, 1.2].forEach((delay) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 130.81;
    gain.gain.setValueAtTime(0, chordTime + delay);
    gain.gain.linearRampToValueAtTime(0.3, chordTime + delay + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.01, chordTime + delay + 0.3);
    osc.start(chordTime + delay);
    osc.stop(chordTime + delay + 0.3);
  });
  
  const bellTime = now + 2.0;
  [2093.00, 2637.02, 3135.96].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, bellTime + i * 0.1);
    gain.gain.linearRampToValueAtTime(0.2, bellTime + i * 0.1 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.01, bellTime + i * 0.1 + 1.5);
    osc.start(bellTime + i * 0.1);
    osc.stop(bellTime + i * 0.1 + 1.5);
  });
  
  const finalTime = now + 2.7;
  [261.63, 329.63, 392.00, 523.25, 659.25, 783.99].forEach((freq) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, finalTime);
    gain.gain.linearRampToValueAtTime(0.2, finalTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.01, finalTime + 2);
    osc.start(finalTime);
    osc.stop(finalTime + 2);
  });
}

window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

updateAttemptInfo();
</script>
